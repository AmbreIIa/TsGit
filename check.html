<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення — TuzShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="Logo"> 
        <img src="images/logo.png" class="logo" height="115" alt="Logo">
        <h1>TuzShop</h1>
    </div>
    
    <button class="menu-toggle" aria-label="Відкрити меню">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </button>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="#">Товари</a></li>
            <li>
                <a href="check.html" class="btn-cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121 -2.3 2.1 -4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                    <span>Кошик</span>
                </a>
            </li>
        </ul>
    </nav>
</header>

<main>
    <div class="checkout-container">
        <h2>Оформлення замовлення</h2>
        <form action="#" method="POST" class="checkout-form">
            <fieldset>
                <legend>1. Особисті дані</legend>
                <div class="form-group">
                    <label for="fullName">ПІБ:</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Іванов Іван Іванович">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="phone">Телефон:</label>
                    <input type="tel" id="phone" name="phone" pattern="[\+]\d{12}" placeholder="+380991234567" required title="Формат: +380XXXXXXXXX">
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Спосіб доставки</legend>
                <div class="form-radio"><input type="radio" id="n" name="d" checked><label for="n">Нова Пошта</label></div>
                <div class="form-radio"><input type="radio" id="c" name="d"><label for="c">Укрпошта</label></div>
                <div class="form-group">
                    <label for="city">Місто:</label>
                    <select id="city"><option>Київ</option><option>Львів</option><option>Одеса</option></select>
                </div>
            </fieldset>

            <fieldset>
                <legend>3. Додатково</legend>
                <div class="form-group">
                    <label for="comm">Коментар:</label>
                    <textarea id="comm" rows="3"></textarea>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">Я погоджуюсь з правилами</label>
                </div>
            </fieldset>

            <button type="submit" class="buy-btn">Підтвердити замовлення</button>
        </form>
    </div>
</main>

<footer>
    <div class="footer-content" style="justify-content: center;">
        <p>&copy; 2026 TuzShop</p>
    </div>
</footer>

</body>
</html>
